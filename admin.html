<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Vaistų info</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e8eaf6;font-size:14px;padding:24px}
h1{font-size:1.3rem;margin-bottom:24px;color:#818cf8}
h2{font-size:0.9rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.card{background:#1a1d2e;border:1px solid #2e3150;border-radius:10px;padding:16px}
.card .val{font-size:1.6rem;font-weight:700;color:#e8eaf6;margin:6px 0 2px}
.card .lbl{font-size:0.75rem;color:#6b7280}
.card .sub{font-size:0.72rem;color:#4b5563;margin-top:2px}
.section{background:#1a1d2e;border:1px solid #2e3150;border-radius:10px;padding:18px;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:0.82rem}
th{text-align:left;padding:6px 10px;color:#6b7280;border-bottom:1px solid #2e3150;font-weight:600;text-transform:uppercase;font-size:0.72rem;letter-spacing:.04em}
td{padding:7px 10px;border-bottom:1px solid #1e2138;color:#c5c8e8}
tr:last-child td{border-bottom:none}
tr:hover td{background:#252840}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.72rem;font-weight:600}
.badge.ok{background:#064e3b;color:#34d399}
.badge.warn{background:#451a03;color:#fb923c}
.badge.off{background:#1f2937;color:#6b7280}
.badge.block{background:#450a0a;color:#f87171}
.progress{background:#252840;border-radius:4px;height:6px;overflow:hidden;width:80px;display:inline-block;vertical-align:middle}
.progress-bar{height:100%;border-radius:4px;background:#6366f1;transition:width .3s}
.progress-bar.warn{background:#f59e0b}
.progress-bar.danger{background:#ef4444}
.btn{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:0.82rem;cursor:pointer;font-weight:600;transition:background .15s}
.btn:hover{background:#818cf8}
.btn.red{background:#ef4444}.btn.red:hover{background:#f87171}
.btn.gray{background:#374151;color:#9ca3af}.btn.gray:hover{background:#4b5563}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.ts{color:#4b5563;font-size:0.75rem}
.drug-name{color:#818cf8;font-weight:600}
.ip{color:#34d399;font-family:monospace}
.model-tag{color:#f59e0b;font-size:0.75rem}
#lastUpdated{color:#4b5563;font-size:0.75rem;margin-left:auto}
</style>
</head>
<body>

<h1>🔧 Vaistų info — Admin panelis</h1>

<div class="actions">
  <button class="btn" onclick="loadAll()">🔄 Atnaujinti</button>
  <button class="btn gray" onclick="clearCache('ai')">🗑 Valyti AI cache</button>
  <button class="btn gray" onclick="clearCache('raw')">🗑 Valyti Raw cache</button>
  <button class="btn red" onclick="if(confirm('Išvalyti abu cache?')){clearCache('ai');clearCache('raw')}">⚠️ Valyti viską</button>
  <span id="lastUpdated"></span>
</div>

<!-- SUMMARY KORTELĖS -->
<div id="summaryGrid" class="grid"></div>

<!-- MODELIŲ STATUSAS -->
<div class="section">
  <h2>🤖 AI Modeliai — Rate Limits</h2>
  <table id="modelsTable">
    <thead><tr>
      <th>Modelis</th><th>Statusas</th>
      <th>RPM</th><th>RPD</th>
      <th>Visas</th><th>429 kl.</th><th>Blokuotas iki</th>
    </tr></thead>
    <tbody></tbody>
  </table>
</div>

<!-- TOP VAISTAI -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
  <div class="section">
    <h2>💊 Top vaistai</h2>
    <table id="drugsTable">
      <thead><tr><th>#</th><th>Vaistas</th><th>Užklausos</th><th>Šaltinis</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="section">
    <h2>🌐 Top IP</h2>
    <table id="ipsTable">
      <thead><tr><th>#</th><th>IP</th><th>Užklausos</th><th>Paskutinė</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- PASKUTINĖS UŽKLAUSOS -->
<div class="section">
  <h2>📋 Paskutinės užklausos</h2>
  <table id="recentTable">
    <thead><tr>
      <th>Laikas</th><th>IP</th><th>Vaistai</th>
      <th>Modelis/Šaltinis</th><th>Trukmė</th><th>Cache</th><th>Klaida</th>
    </tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || prompt('Admin slaptažodis:') || '';
if (TOKEN) history.replaceState({}, '', `?token=${encodeURIComponent(TOKEN)}`);

async function api(path, opts = {}) {
  const res = await fetch(path, { headers: { 'x-admin-token': TOKEN }, ...opts });
  if (res.status === 401) { alert('Neteisingas slaptažodis'); return null; }
  return res.json();
}

function pct(used, limit) {
  const p = Math.round(used / limit * 100);
  const cls = p >= 90 ? 'danger' : p >= 60 ? 'warn' : '';
  return `<span class="progress"><span class="progress-bar ${cls}" style="width:${Math.min(p,100)}%"></span></span> ${used}/${limit} <small style="color:#6b7280">(${p}%)</small>`;
}

function relTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000)  return `${Math.round(diff/1000)}s`;
  if (diff < 3600000) return `${Math.round(diff/60000)}min`;
  return `${Math.round(diff/3600000)}h`;
}

function modelBadge(source) {
  if (!source) return '';
  if (source.includes('groq'))   return `<span class="badge warn">${source}</span>`;
  if (source.includes('gemini')) return `<span class="badge ok">${source}</span>`;
  if (source === 'ai-cache')     return `<span class="badge ok">⚡ cache</span>`;
  return `<span class="badge off">${source}</span>`;
}

async function loadStats() {
  const d = await api('/api/admin/stats');
  if (!d) return;
  const s = d.summary;

  document.getElementById('summaryGrid').innerHTML = [
    { val: s.totalRequests, lbl: 'Viso užklausų', sub: `Uptime: ${s.uptimeMin} min` },
    { val: `${s.cacheHitRate}%`, lbl: 'Raw cache hit', sub: `${s.cacheHits} iš ${s.totalRequests}` },
    { val: `${s.aiCacheHitRate}%`, lbl: 'AI cache hit', sub: `${s.aiCacheHits} užsaugota` },
    { val: `${s.avgResponseMs}ms`, lbl: 'Vid. atsakymo laikas', sub: 'paskutiniai 100' },
    { val: s.errors, lbl: 'Klaidos', sub: '' },
  ].map(c => `<div class="card"><div class="lbl">${c.lbl}</div><div class="val">${c.val}</div><div class="sub">${c.sub}</div></div>`).join('');

  // Top drugs
  const dTbody = document.querySelector('#drugsTable tbody');
  dTbody.innerHTML = d.topDrugs.slice(0, 15).map((dr, i) => {
    const topSrc = Object.entries(dr.sources || {}).sort((a,b)=>b[1]-a[1])[0]?.[0] || '-';
    return `<tr><td style="color:#4b5563">${i+1}</td><td class="drug-name">${dr.name}</td><td>${dr.count}</td><td><span class="badge off">${topSrc}</span></td></tr>`;
  }).join('') || '<tr><td colspan="4" style="color:#4b5563">Duomenų nėra</td></tr>';

  // Top IPs
  const iTbody = document.querySelector('#ipsTable tbody');
  iTbody.innerHTML = d.topIps.slice(0, 15).map((ip, i) =>
    `<tr><td style="color:#4b5563">${i+1}</td><td class="ip">${ip.ip}</td><td>${ip.count}</td><td class="ts">${relTime(ip.lastSeen)} atg.</td></tr>`
  ).join('') || '<tr><td colspan="4" style="color:#4b5563">Duomenų nėra</td></tr>';

  // Recent
  const rTbody = document.querySelector('#recentTable tbody');
  rTbody.innerHTML = d.recent.slice(0, 50).map(r =>
    `<tr>
      <td class="ts">${new Date(r.ts).toLocaleTimeString('lt-LT')}</td>
      <td class="ip">${r.ip}</td>
      <td class="drug-name">${(r.drugs||[]).join(', ')}</td>
      <td>${modelBadge(r.source)}</td>
      <td>${r.responseMs}ms</td>
      <td>${r.aiCacheHit ? '⚡ AI' : r.cacheHit ? '📦 Raw' : '—'}</td>
      <td style="color:#f87171;font-size:0.75rem">${r.error || ''}</td>
    </tr>`
  ).join('') || '<tr><td colspan="7" style="color:#4b5563">Duomenų nėra</td></tr>';
}

async function loadModels() {
  const models = await api('/api/admin/models');
  if (!models) return;
  const tbody = document.querySelector('#modelsTable tbody');
  tbody.innerHTML = models.map(m => {
    const statusBadge = !m.hasKey ? '<span class="badge off">Nėra rakto</span>'
      : m.blockedUntil   ? '<span class="badge block">⏸ Blokuotas</span>'
      : !m.available     ? '<span class="badge warn">Limitas</span>'
      :                    '<span class="badge ok">✓ Aktyvus</span>';
    return `<tr>
      <td><strong>${m.label}</strong><br><span style="color:#4b5563;font-size:0.72rem">${m.id}</span></td>
      <td>${statusBadge}</td>
      <td>${pct(m.rpmUsed, m.rpmLimit)}</td>
      <td>${pct(m.rpdUsed, m.rpdLimit)}</td>
      <td>${m.totalCalls}</td>
      <td style="color:${m.errors429>0?'#f87171':'#4b5563'}">${m.errors429}</td>
      <td class="ts">${m.blockedUntil ? new Date(m.blockedUntil).toLocaleTimeString('lt-LT') : '—'}</td>
    </tr>`;
  }).join('');
}

async function clearCache(type) {
  const r = await api('/api/admin/cache-clear', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN }, body: JSON.stringify({ type }) });
  if (r?.ok) alert(`Išvalyta: ${r.cleared} failų (${type})`);
}

async function loadAll() {
  await Promise.all([loadStats(), loadModels()]);
  document.getElementById('lastUpdated').textContent = 'Atnaujinta: ' + new Date().toLocaleTimeString('lt-LT');
}

// Auto-refresh kas 15s
loadAll();
setInterval(loadAll, 15000);
</script>
</body>
</html>
